<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 找不到頁面 | 好厝邊寵物店</title>
    <meta name="description" content="找不到您要的頁面，請返回首頁繼續逛逛。" />
    <link rel="icon" href="/pet-commerce-link-hub/assets/icons/favicon.ico" />
    <link rel="stylesheet" href="/pet-commerce-link-hub/assets/css/style.css" />
    <style>
      /* ===== 404 專屬樣式 ===== */
      .error-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        position: relative;
        z-index: 1;
        text-align: center;
      }

      .error-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border-radius: 32px;
        padding: 56px 48px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.06),
          0 0 0 1px rgba(255, 255, 255, 0.8) inset;
        max-width: 520px;
        width: 100%;
        animation: fadeInUp 0.6s ease-out backwards;
      }

      .error-illustration {
        margin-bottom: 32px;
      }

      .error-illustration img {
        width: 160px;
        height: 160px;
        object-fit: contain;
        filter: drop-shadow(0 12px 28px rgba(44, 185, 222, 0.2));
        animation: petFloat 4s ease-in-out infinite;
      }

      @keyframes petFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
      }

      .error-code {
        font-size: 6rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        line-height: 1;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 16px;
      }

      .error-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: #1d1d1f;
        margin-bottom: 12px;
      }

      .error-desc {
        font-size: 1rem;
        color: #6e6e73;
        line-height: 1.7;
        margin-bottom: 36px;
      }

      .error-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 28px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        text-decoration: none;
        border-radius: 14px;
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
      }

      .btn-primary:hover {
        transform: translateY(-2px) scale(1.03);
        box-shadow: 0 8px 24px rgba(102, 126, 234, 0.5);
      }

      .btn-secondary {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 28px;
        background: rgba(102, 126, 234, 0.1);
        color: #667eea;
        text-decoration: none;
        border-radius: 14px;
        font-size: 1rem;
        font-weight: 600;
        border: 1.5px solid rgba(102, 126, 234, 0.25);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .btn-secondary:hover {
        transform: translateY(-2px) scale(1.03);
        background: rgba(102, 126, 234, 0.18);
        border-color: rgba(102, 126, 234, 0.5);
      }

      .error-footer-hint {
        margin-top: 24px;
        font-size: 0.85rem;
        color: #86868b;
      }

      @media (max-width: 480px) {
        .error-card {
          padding: 40px 28px;
        }

        .error-code {
          font-size: 4.5rem;
        }

        .error-title {
          font-size: 1.25rem;
        }

        .error-illustration img {
          width: 120px;
          height: 120px;
        }
      }
    </style>
  </head>
  <body>
    <div class="background-gradient"></div>

    <main class="error-page">
      <div class="error-card">

        <!-- 插圖：帶著疑問表情、拿著問號書的小貓 -->
        <div class="error-illustration">
          <img src="/pet-commerce-link-hub/assets/images/errors/404_cat.png" alt="帶著疑問表情、拿著問號書的小貓插圖">
        </div>

        <div class="error-code">404</div>
        <h1 class="error-title">咦？這裡好像沒有你要找的內容</h1>
        <p class="error-desc">
          這隻帶著問號書的小貓也正在研究中。<br>
          您要找的頁面可能不存在、已移動，或網址輸入錯了。
        </p>

        <div class="error-actions">
          <a href="/pet-commerce-link-hub/" class="btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
            回到首頁
          </a>
          <a href="javascript:history.back()" class="btn-secondary">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            返回上一頁
          </a>
        </div>

        <p class="error-footer-hint">好厝邊寵物店 &nbsp;·&nbsp; 飼料・用品嚴選</p>
      </div>
    </main>
  </body>
</html>
