<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 找不到頁面 | 寵物生活用品館</title>
    <meta name="description" content="找不到您要的頁面，請返回首頁繼續逛逛。" />
    <link rel="icon" href="assets/favicon.ico" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
      /* ===== 404 專屬樣式 ===== */
      .error-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        position: relative;
        z-index: 1;
        text-align: center;
      }

      .error-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border-radius: 32px;
        padding: 56px 48px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.06),
          0 0 0 1px rgba(255, 255, 255, 0.8) inset;
        max-width: 520px;
        width: 100%;
        animation: fadeInUp 0.6s ease-out backwards;
      }

      .error-illustration {
        margin-bottom: 32px;
      }

      .error-illustration svg {
        width: 160px;
        height: 160px;
        filter: drop-shadow(0 8px 24px rgba(102, 126, 234, 0.25));
        animation: petFloat 4s ease-in-out infinite;
      }

      @keyframes petFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
      }

      .error-code {
        font-size: 6rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        line-height: 1;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 16px;
      }

      .error-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: #1d1d1f;
        margin-bottom: 12px;
      }

      .error-desc {
        font-size: 1rem;
        color: #6e6e73;
        line-height: 1.7;
        margin-bottom: 36px;
      }

      .error-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 28px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        text-decoration: none;
        border-radius: 14px;
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
      }

      .btn-primary:hover {
        transform: translateY(-2px) scale(1.03);
        box-shadow: 0 8px 24px rgba(102, 126, 234, 0.5);
      }

      .btn-secondary {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 28px;
        background: rgba(102, 126, 234, 0.1);
        color: #667eea;
        text-decoration: none;
        border-radius: 14px;
        font-size: 1rem;
        font-weight: 600;
        border: 1.5px solid rgba(102, 126, 234, 0.25);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .btn-secondary:hover {
        transform: translateY(-2px) scale(1.03);
        background: rgba(102, 126, 234, 0.18);
        border-color: rgba(102, 126, 234, 0.5);
      }

      .error-footer-hint {
        margin-top: 24px;
        font-size: 0.85rem;
        color: #86868b;
      }

      @media (max-width: 480px) {
        .error-card {
          padding: 40px 28px;
        }

        .error-code {
          font-size: 4.5rem;
        }

        .error-title {
          font-size: 1.25rem;
        }

        .error-illustration svg {
          width: 120px;
          height: 120px;
        }
      }
    </style>
  </head>
  <body>
    <div class="background-gradient"></div>

    <main class="error-page">
      <div class="error-card">

        <!-- 插圖：迷路小貓 -->
        <div class="error-illustration">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none">
            <!-- 背景光暈 -->
            <circle cx="80" cy="90" r="55" fill="url(#bgGlow)" opacity="0.15"/>

            <!-- 身體 -->
            <ellipse cx="80" cy="105" rx="32" ry="26" fill="url(#bodyGrad)"/>

            <!-- 尾巴 -->
            <path d="M112 110 Q140 90 132 72 Q128 64 120 70 Q130 80 108 102 Z"
                  fill="url(#bodyGrad)" stroke="none"/>

            <!-- 頭部 -->
            <circle cx="80" cy="72" r="30" fill="url(#headGrad)"/>

            <!-- 左耳 -->
            <polygon points="54,50 46,28 68,44" fill="url(#headGrad)"/>
            <polygon points="56,48 50,34 64,44" fill="#f093fb" opacity="0.6"/>

            <!-- 右耳 -->
            <polygon points="106,50 114,28 92,44" fill="url(#headGrad)"/>
            <polygon points="104,48 110,34 96,44" fill="#f093fb" opacity="0.6"/>

            <!-- 眼睛（困惑表情：一眼 X 一眼圓） -->
            <!-- 左眼 X -->
            <line x1="67" y1="66" x2="73" y2="72" stroke="#1d1d1f" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="73" y1="66" x2="67" y2="72" stroke="#1d1d1f" stroke-width="2.5" stroke-linecap="round"/>
            <!-- 右眼（大圓眼） -->
            <circle cx="93" cy="69" r="6" fill="white"/>
            <circle cx="94" cy="69" r="3.5" fill="#1d1d1f"/>
            <circle cx="95.5" cy="67.5" r="1.2" fill="white"/>

            <!-- 鼻子 -->
            <ellipse cx="80" cy="79" rx="3" ry="2" fill="#f093fb"/>

            <!-- 嘴巴（困惑波浪） -->
            <path d="M73 84 Q76 81 80 84 Q84 87 87 84" stroke="#1d1d1f" stroke-width="1.8" fill="none" stroke-linecap="round"/>

            <!-- 問號 -->
            <text x="108" y="52" font-size="22" font-weight="800" fill="url(#purpleGrad)" font-family="system-ui, sans-serif" opacity="0.9">?</text>

            <!-- 腳掌 -->
            <ellipse cx="65" cy="128" rx="10" ry="7" fill="url(#bodyGrad)" opacity="0.9"/>
            <ellipse cx="95" cy="128" rx="10" ry="7" fill="url(#bodyGrad)" opacity="0.9"/>

            <!-- 定義漸層 -->
            <defs>
              <radialGradient id="bgGlow" cx="50%" cy="50%">
                <stop offset="0%" stop-color="#667eea"/>
                <stop offset="100%" stop-color="#764ba2"/>
              </radialGradient>
              <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#b8c5f5"/>
                <stop offset="100%" stop-color="#d4aef5"/>
              </linearGradient>
              <linearGradient id="headGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#c4cff7"/>
                <stop offset="100%" stop-color="#ddbcf8"/>
              </linearGradient>
              <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#667eea"/>
                <stop offset="100%" stop-color="#764ba2"/>
              </linearGradient>
            </defs>
          </svg>
        </div>

        <div class="error-code">404</div>
        <h1 class="error-title">咦？這個頁面迷路了！</h1>
        <p class="error-desc">
          您找的頁面不存在或已移除。<br>
          別擔心，我們的毛孩子會帶您回正確的路！
        </p>

        <div class="error-actions">
          <a href="index.html" class="btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
            回到首頁
          </a>
          <a href="javascript:history.back()" class="btn-secondary">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            返回上一頁
          </a>
        </div>

        <p class="error-footer-hint">寵物生活用品館 &nbsp;·&nbsp; 飼料・用品嚴選</p>
      </div>
    </main>
  </body>
</html>
